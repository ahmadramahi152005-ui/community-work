<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اليوم العالمي للضمير</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background-color: #f7d29a; overflow: hidden; }

        /* Navbar matches the top strip of IMG-20260512-WA0003.jpg */
        .navbar {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            padding: 10px 50px;
            height: 80px;
        }
        .nav-links { display: flex; gap: 30px; justify-content: center; }
        .nav-links a { text-decoration: none; color: #4a1a1a; font-weight: bold; font-size: 1.1rem; }
        .quote { font-size: 0.9rem; color: #4a1a1a; }
        .logo-box { display: flex; justify-content: flex-end; }
        .logo-circle { 
            width: 60px; height: 60px; background: white; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: 2px solid #d64550; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Main Container */
        .hero {
            display: grid;
            grid-template-columns: 55% 45%; /* Keeps image and red section separate */
            height: calc(100vh - 80px);
            position: relative;
        }

        /* Image Side */
        .image-side { width: 100%; height: 100%; }
        .image-side img { width: 100%; height: 100%; object-fit: cover; }

        /* Red Section with the "Wave" */
        .content-side {
            background-color: #d64550;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-right: 60px;
            color: white;
        }

        /* This creates the overlapping curve from IMG-20260512-WA0003.jpg */
        .content-side::before {
            content: "";
            position: absolute;
            left: -150px; /* Pulls the curve over the image */
            top: 0;
            width: 151px;
            height: 100%;
            background-color: #d64550;
            clip-path: ellipse(100% 60% at 100% 50%);
        }

        .text-container { z-index: 2; text-align: right; width: 100%; padding-right: 20px; }
        .text-container h1 { font-size: 4rem; margin-bottom: 20px; line-height: 1.1; }
        .text-container p { font-size: 2.5rem; line-height: 1.4; }
        .highlight { color: #f7d29a; }

        /* Social floating on bottom right */
        .socials {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .icon {
            width: 45px; height: 45px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #d64550; font-size: 1.2rem; box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="quote">" أنت أمل العالم "</div>
        <nav class="nav-links">
            <a href="#">الصفحة الرئيسية</a>
            <a href="#">من نحن</a>
            <a href="#">تواصل معنا</a>
        </nav>
        <div class="logo-box">
            <div class="logo-circle">❤️</div>
        </div>
    </header>

    <section class="hero">
        <div class="image-side">
            <!-- Ensure IMG-20260512-WA0003.jpg is in the same folder -->
            <img src="IMG-20260512-WA0003.jpg" alt="Community Support">
        </div>
        
        <div class="content-side">
            <div class="text-container">
                <h1>اليوم العالمي للضمير</h1>
                <p>مساهمة بسيطة تصنع</p>
                <p>فرقاً في حياة <span class="highlight">شخص</span></p>
            </div>
        </div>

        <div class="socials">
            <div class="icon">📞</div>
            <div class="icon">f</div>
        </div>
    </section>

</body>
</html>
