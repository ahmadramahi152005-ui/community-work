<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اليوم العالمي للضمير</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #f06a74, #ea7b80);
            overflow-x: hidden;
            min-height: 200vh;
        }

        /* Navbar */
        nav {
            width: 100%;
            background: #e7c18e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            position: relative;
            z-index: 10;
        }

        nav .links {
            display: flex;
            gap: 40px;
        }

        nav .links a {
            text-decoration: none;
            color: #5a2230;
            font-size: 24px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav .links a:hover {
            opacity: 0.7;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .quote {
            color: #5a2230;
            font-size: 20px;
            font-weight: bold;
        }

        .logo {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 10px;
            font-weight: bold;
            color: #5a2230;
            border: 4px solid #f3d5a8;
        }

        /* Fixed Background Image */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: url('community-work.jpeg') center center/cover no-repeat;
            z-index: -5;
        }

        /* Curves Layer */
        .curve {
            position: fixed;
            border-radius: 50%;
            z-index: -4;
        }

        .curve1 {
            width: 1400px;
            height: 1400px;
            background: rgba(240, 93, 103, 0.95);
            top: -350px;
            left: -500px;
        }

        .curve2 {
            width: 1100px;
            height: 1100px;
            background: rgba(216, 72, 85, 0.75);
            top: -200px;
            left: -250px;
        }

        .curve3 {
            width: 850px;
            height: 850px;
            background: rgba(255, 120, 130, 0.65);
            top: -100px;
            left: -100px;
        }

        /* Hero Content */
        .hero-content {
            min-height: 100vh;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 80px;
            position: relative;
            z-index: 5;
        }

        .text-box {
            width: 45%;
            color: white;
            text-align: right;
        }

        .text-box h1 {
            font-size: 65px;
            margin-bottom: 50px;
        }

        .text-box p {
            font-size: 55px;
            font-weight: bold;
            line-height: 1.5;
        }

        .highlight {
            color: #ffd45b;
        }

        .after-section {
            min-height: 100vh;
            background: linear-gradient(to bottom, #ea7b80, #d94e5a);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 50px;
            position: relative;
            z-index: 5;
        }

        .after-section h2 {
            font-size: 60px;
            margin-bottom: 30px;
        }

        .after-section p {
            font-size: 28px;
            max-width: 800px;
            line-height: 1.8;
        }

        .logo-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: white;
            object-fit: cover;
        }

        /* Background Shapes */
        .circle1 {
            position: absolute;
            width: 700px;
            height: 700px;
            background: #f15d67;
            border-radius: 50%;
            bottom: -300px;
            left: -250px;
            z-index: 1;
        }

        .circle2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: #d94855;
            border-radius: 50%;
            top: -150px;
            right: 25%;
            opacity: 0.5;
            z-index: 1;
        }

        .circle3 {
            position: absolute;
            width: 250px;
            height: 250px;
            background: #c43d4c;
            border-radius: 100% 0 0 0;
            bottom: 0;
            right: 0;
            z-index: 1;
        }

        /* Social Icons */
        .social {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 20;
        }

        .social button {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            background: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .social button:hover {
            transform: scale(1.1);
        }

        /* Responsive */
        @media (max-width: 1000px) {
            .hero {
                flex-direction: column;
                text-align: center;
            }

            .hero-image,
            .hero-text {
                width: 100%;
            }

            .hero-text {
                margin-top: 40px;
            }

            .hero-text h1 {
                font-size: 40px;
            }

            .hero-text p {
                font-size: 35px;
            }

            nav {
                flex-direction: column;
                gap: 20px;
            }

            nav .links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- Background Image Layer -->
    <div class="background-image"></div>

    <!-- Overlay Curves -->
    <div class="curve curve1"></div>
    <div class="curve curve2"></div>
    <div class="curve curve3"></div>

    <!-- Navbar -->
    <nav>

        <!-- Logo on Right -->
        <div class="logo-section">
            <img src="logo.png" alt="Logo" class="logo-img">
        </div>

        <!-- Navigation Links -->
        <div class="links">
            <a href="#">الصفحة الرئيسية</a>
            <a href="#">من نحن</a>
            <a href="#">تواصل معنا</a>
        </div>

        <!-- Quote -->
        <p class="quote">"أنت أمل العالم"</p>

    </nav>

    <!-- Hero Content -->
    <section class="hero-content">

        <div class="text-box">
            <h1>اليوم العالمي للضمير</h1>

            <p>مساهمة بسيطة</p>
            <p>تصنع</p>
            <p>
                فرقًا في حياة <span class="highlight">شخص</span>
            </p>

            <button class="donate-btn">تبرع الآن</button>
        </div>

    </section>

    <!-- Extra Content To Scroll -->
    <section class="after-section">
        <h2>معًا نصنع الأمل</h2>
        <p>
            هذا القسم فقط لتوضيح تأثير التمرير،
            عند النزول للأسفل ستختفي الصورة ويبقى
            لون الخلفية مع الطبقات المنحنية.
        </p>
    </section>

    <!-- Social Icons -->
    <div class="social">
        <button>📞</button>
        <button>f</button>
    </div>

</body>
</html>
