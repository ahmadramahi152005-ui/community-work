<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اليوم العالمي للضمير</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #e86b72;
            overflow-x: hidden;
        }

        /* Navbar */
        nav {
            width: 100%;
            background: #e7c18e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            position: relative;
            z-index: 10;
        }

        nav .links {
            display: flex;
            gap: 40px;
        }

        nav .links a {
            text-decoration: none;
            color: #5a2230;
            font-size: 24px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav .links a:hover {
            opacity: 0.7;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .quote {
            color: #5a2230;
            font-size: 20px;
            font-weight: bold;
        }

        .logo {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 10px;
            font-weight: bold;
            color: #5a2230;
            border: 4px solid #f3d5a8;
        }

        /* Hero Section */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 90vh;
            position: relative;
            padding: 40px;
        }

        .hero-image {
            width: 65%;
            position: relative;
            z-index: 2;
        }

        .hero-image img {
            width: 100%;
            border-radius: 0 0 120px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .hero-text {
            width: 30%;
            color: white;
            z-index: 2;
        }

        .hero-text h1 {
            font-size: 55px;
            margin-bottom: 50px;
            line-height: 1.3;
        }

        .hero-text p {
            font-size: 50px;
            font-weight: bold;
            line-height: 1.5;
        }

        .highlight {
            color: #ffd45b;
        }

        .donate-btn {
            margin-top: 40px;
            padding: 15px 35px;
            border: none;
            background: #ffd45b;
            color: #5a2230;
            font-size: 24px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .donate-btn:hover {
            background: #ffc928;
            transform: scale(1.05);
        }

        /* Background Shapes */
        .circle1 {
            position: absolute;
            width: 700px;
            height: 700px;
            background: #f15d67;
            border-radius: 50%;
            bottom: -300px;
            left: -250px;
            z-index: 1;
        }

        .circle2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: #d94855;
            border-radius: 50%;
            top: -150px;
            right: 25%;
            opacity: 0.5;
            z-index: 1;
        }

        .circle3 {
            position: absolute;
            width: 250px;
            height: 250px;
            background: #c43d4c;
            border-radius: 100% 0 0 0;
            bottom: 0;
            right: 0;
            z-index: 1;
        }

        /* Social Icons */
        .social {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 20;
        }

        .social button {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            background: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .social button:hover {
            transform: scale(1.1);
        }

        /* Responsive */
        @media (max-width: 1000px) {
            .hero {
                flex-direction: column;
                text-align: center;
            }

            .hero-image,
            .hero-text {
                width: 100%;
            }

            .hero-text {
                margin-top: 40px;
            }

            .hero-text h1 {
                font-size: 40px;
            }

            .hero-text p {
                font-size: 35px;
            }

            nav {
                flex-direction: column;
                gap: 20px;
            }

            nav .links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <div class="links">
            <a href="#">الصفحة الرئيسية</a>
            <a href="#">من نحن</a>
            <a href="#">تواصل معنا</a>
        </div>

        <div class="logo-section">
            <p class="quote">"أنت أمل العالم"</p>

            <div class="logo">
                اليوم العالمي
                <br>
                للضمير
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">

        <div class="hero-image">
            <img src="community-work.jpg" alt="عمل تطوعي">
        </div>

        <div class="hero-text">
            <h1>اليوم العالمي للضمير</h1>

            <p>مساهمة بسيطة</p>
            <p>تصنع</p>
            <p>فرقًا في حياة <span class="highlight">شخص</span></p>

            <button class="donate-btn">تبرع الآن</button>
        </div>

        <!-- Background Shapes -->
        <div class="circle1"></div>
        <div class="circle2"></div>
        <div class="circle3"></div>

    </section>

    <!-- Social Icons -->
    <div class="social">
        <button>📞</button>
        <button>f</button>
    </div>

</body>
</html>
